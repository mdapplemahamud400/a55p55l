name: Run XFilter Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

concurrency:
  group: xfilter-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run bot with auto restart
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          echo "✅ Bot runner started with auto-restart system"

          END_TIME=$((SECONDS + 17700))

          while [ $SECONDS -lt $END_TIME ]; do
            echo "🚀 Starting bot..."
            python ckr.py
            EXIT_CODE=$?

            echo "⚠️ Bot stopped/crashed with exit code: $EXIT_CODE"
            echo "⏳ Waiting 30 seconds before restart..."
            sleep 30
          done

          echo "✅ 4h 55m completed. Workflow will stop safely."
